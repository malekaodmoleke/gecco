<div class="search-overlay" id="searchOverlay">

    role="search"

    method="get"

    <input
      type="search"
      id="searchInput"
      name="q"
      placeholder="Search GECCO and blog ..."
      autocomplete="off"
    >

    <button class="submit-search" type="submit" aria-label="Search">

    </button>

      <i class="fa-solid fa-xmark"></i>
    </button>
  </form>

<style>
.site-header{
  height:76px;
  background:#fff;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:relative;
  z-index:9999;
}

.logo-area{
  width:170px;
  padding-left:28px;
  display:flex;
  align-items:center;
}

.logo-link img{
  width:74px;
  height:74px;
  object-fit:contain;
  display:block;
}

.main-nav{
  display:flex;
  align-items:stretch;
  justify-content:flex-end;
  height:100%;
  flex:1;
}

.main-nav > a,
.nav-item > button,
.search-btn{
  height:100%;
  padding:0 24px;
  border:0;
  border-left:1px solid #ddd;
  background:#fff;
  color:#00408f;
  font-weight:700;
  font-size:13px;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-family:Arial, Helvetica, sans-serif;
  white-space:nowrap;
}

.main-nav > a:hover,
.nav-item > button:hover,
.search-btn:hover{
  color:#238d19;
}

.nav-item{
  position:relative;
}

.nav-item button i{
  margin-left:8px;
  font-size:11px;
}

.search-btn{
  width:76px;
  border-right:1px solid #ddd;
  font-size:22px;
}

.dropdown{
  display:none;
  position:absolute;
  top:76px;
  left:0;
  width:360px;
  background:#fff;
  box-shadow:0 8px 25px rgba(0,0,0,.12);
  z-index:99999;
}

.dropdown-right{
  right:0;
  left:auto;
  width:260px;
}

.dropdown a{
  display:block;
  padding:22px 18px;
  border-bottom:1px solid #bbb;
  color:#00408f;
  font-size:13px;
  font-weight:700;
  text-decoration:none;
  line-height:1.6;
  background:#fff;
}

.dropdown a:hover{
  background:#f3faf1;
  color:#238d19;
}

.nav-item:hover .dropdown{
  display:block;
}

/* SEARCH OVERLAY */
.search-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:76px;
  background:#fff;
  border-bottom:1px solid #ddd;
  z-index:9999999;
  transform:translateY(-100%);
  transition:.35s ease;
}

.search-overlay.active{
  transform:translateY(0);
}

.search-container{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  padding:0 32px;
}

.search-container img{
  width:74px;
  height:74px;
  object-fit:contain;
  margin-right:35px;
}

.search-container input{
  flex:1;
  height:46px;
  border:none;
  outline:none;
  font-size:18px;
  color:#00408f;
  background:transparent;
}

.search-container input::placeholder{
  color:#00408f;
}

.submit-search,
.close-search{
  width:60px;
  height:60px;
  background:none;
  border:none;
  color:#00408f;
  font-size:30px;
  cursor:pointer;
}

.submit-search{
  font-size:24px;
}

.close-search:hover,
.submit-search:hover{
  color:#238d19;
}

/* MOBILE */
.mobile-toggle{
  display:none;
  background:none;
  border:0;
  color:#00408f;
  font-size:28px;
  padding:20px;
}

@media(max-width:1250px){
  .mobile-toggle{
    display:block;
  }

  .main-nav{
    display:none;
    position:absolute;
    top:76px;
    left:0;
    width:100%;
    height:auto;
    background:#fff;
    flex-direction:column;
    border-top:1px solid #ddd;
  }

  .main-nav.active{
    display:flex;
  }

  .main-nav > a,
  .nav-item > button,
  .search-btn{
    width:100%;
    height:58px;
    justify-content:flex-start;
    border-left:0;
    border-bottom:1px solid #ddd;
  }

  .search-btn{
    font-size:20px;
  }

  .dropdown,
  .dropdown-right{
    position:static;
    width:100%;
    box-shadow:none;
  }

  .nav-item:hover .dropdown{
    display:none;
  }

  .nav-item.open .dropdown{
    display:block;
  }
}

@media(max-width:600px){
  .logo-area{
    width:auto;
    padding-left:18px;
  }

  .logo-link img{
    width:64px;
    height:64px;
  }

  .search-container{
    padding:0 18px;
  }

  .search-container img{
    width:58px;
    height:58px;
    margin-right:18px;
  }

  .search-container input{
    font-size:16px;
  }
}
</style>

<script>
function toggleMenu(){
  document.getElementById("mainNav").classList.toggle("active");
}

document.querySelectorAll(".nav-item > button").forEach(button => {
  button.addEventListener("click", function(){
    if(window.innerWidth <= 1250){
      this.parentElement.classList.toggle("open");
    }
  });
});

function initGeccoHeader(){
  const searchBtn = document.getElementById("searchBtn");
  const searchOverlay = document.getElementById("searchOverlay");
  const siteSearchForm = document.getElementById("siteSearchForm");
  const closeSearch = document.getElementById("closeSearch");
  const searchInput = document.getElementById("searchInput");
  const searchDomain = "gecco.org.uk";

  if(!searchBtn || !searchOverlay || !siteSearchForm || !closeSearch || !searchInput){
    return;
  }

  const runSearch = () => {
    const query = searchInput.value.trim();
    if(!query){
      searchInput.focus();
      return;
    }

    const searchQuery = `site:${searchDomain} ${query}`;
    window.location.assign(`https://www.google.com/search?q=${encodeURIComponent(searchQuery)}`);
  };

  if(!searchBtn.dataset.headerReady){
    searchBtn.addEventListener("click", () => {
      searchOverlay.classList.add("active");
      setTimeout(() => searchInput.focus(), 100);
    });
    searchBtn.dataset.headerReady = "true";
  }

  if(!closeSearch.dataset.headerReady){
    closeSearch.addEventListener("click", () => {
      searchOverlay.classList.remove("active");
    });
    closeSearch.dataset.headerReady = "true";
  }

  if(!siteSearchForm.dataset.headerReady){
    siteSearchForm.addEventListener("submit", (e) => {
      e.preventDefault();
      runSearch();
    });
    siteSearchForm.dataset.headerReady = "true";
  }

  if(!searchInput.dataset.headerReady){
    searchInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        runSearch();
      }
    });
    searchInput.dataset.headerReady = "true";
  }

  if(!document.body.dataset.headerEscapeReady){
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape"){
        const activeOverlay = document.getElementById("searchOverlay");
        if(activeOverlay){
          activeOverlay.classList.remove("active");
        }
      }
    });
    document.body.dataset.headerEscapeReady = "true";
  }
}

initGeccoHeader();
</script>
