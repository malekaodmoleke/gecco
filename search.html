<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search GECCO</title>

  <style>
    :root {
      --blue: #00408f;
      --green: #238d19;
      --light: #f6faf4;
      --text: #344054;
      --muted: #667085;
      --border: #d8dee8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      color: var(--text);
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.7;
    }

    .search-hero {
      background: linear-gradient(120deg, rgba(35,141,25,.92), rgba(0,64,143,.78));
      color: #fff;
      padding: 86px 20px 62px;
      text-align: center;
    }

    .search-hero h1 {
      font-size: clamp(38px, 6vw, 72px);
      font-weight: 700;
      letter-spacing: 0;
      margin-bottom: 14px;
    }

    .search-hero p {
      font-size: 18px;
      max-width: 720px;
      margin: 0 auto;
    }

    .search-page {
      width: min(1040px, 92%);
      margin: 0 auto;
      padding: 46px 0 90px;
    }

    .search-panel {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
      background: #fff;
      padding: 12px;
    }

    .search-panel input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--blue);
      font-size: 18px;
      padding: 10px 8px;
    }

    .search-panel button {
      border: 0;
      background: var(--green);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      padding: 0 24px;
      text-transform: uppercase;
    }

    .search-summary {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .result-list {
      display: grid;
      gap: 16px;
    }

    .result-card {
      border: 1px solid var(--border);
      background: #fff;
      padding: 22px;
    }

    .result-card:hover {
      border-color: var(--green);
    }

    .result-card a {
      color: var(--blue);
      display: inline-block;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      text-decoration: none;
    }

    .result-card a:hover {
      color: var(--green);
    }

    .result-type {
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .result-card p {
      color: var(--muted);
    }

    .empty-state {
      background: var(--light);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 28px;
    }

    @media(max-width: 640px) {
      .search-panel {
        flex-direction: column;
      }

      .search-panel button {
        height: 48px;
      }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <script>
  fetch('./header.html')
    .then(response => response.text())
    .then(data => {
      const placeholder = document.getElementById('header-placeholder');
      placeholder.innerHTML = data;

      placeholder.querySelectorAll('script').forEach(oldScript => {
        const script = document.createElement('script');
        if (oldScript.src) {
          script.src = oldScript.src;
        } else {
          script.textContent = oldScript.textContent;
        }
        document.head.appendChild(script);
        oldScript.remove();
      });
    });
  </script>

  <main>
    <section class="search-hero">
      <h1>Search GECCO</h1>
      <p>Search the main GECCO website and blog articles.</p>
    </section>

    <section class="search-page">
      <form class="search-panel" id="searchPageForm" role="search">
        <input id="searchPageInput" type="search" name="q" placeholder="Search GECCO and blog" autocomplete="off">
        <button type="submit">Search</button>
      </form>

      <p class="search-summary" id="searchSummary">Enter a keyword to search the website.</p>
      <div class="result-list" id="searchResults"></div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script>
  fetch('./footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    })
    .catch(error => console.error('Footer failed to load:', error));

  const staticPages = [
    { title: 'Home', url: 'index.html' },
    { title: 'Why GECCO?', url: 'why-gecco.html' },
    { title: 'Meet The Team', url: 'meet-the-team.html' },
    { title: 'Corporate Social Environmental Responsibility Policy', url: 'cser-policy.html' },
    { title: 'Positive Impact on People', url: 'positive-impact.html' },
    { title: 'Forum', url: 'forum.html' },
    { title: 'Corporate Partnerships', url: 'corporate-partnerships.html' },
    { title: 'Commission Us', url: 'commission-us.html' },
    { title: 'Volunteer', url: 'volunteer.html' },
    { title: 'Donate', url: 'donations.html' }
  ];

  const form = document.getElementById('searchPageForm');
  const input = document.getElementById('searchPageInput');
  const summary = document.getElementById('searchSummary');
  const results = document.getElementById('searchResults');
  const params = new URLSearchParams(window.location.search);
  const initialQuery = params.get('q') || '';

  function cleanText(value) {
    return value.replace(/\s+/g, ' ').trim();
  }

  function createSnippet(text, query) {
    const clean = cleanText(text);
    const lowerText = clean.toLowerCase();
    const lowerQuery = query.toLowerCase();
    const index = lowerText.indexOf(lowerQuery);
    const start = index > 90 ? index - 90 : 0;
    const end = index >= 0 ? index + lowerQuery.length + 140 : 220;
    return clean.slice(start, end) + (clean.length > end ? '...' : '');
  }

  function decodeHtml(value) {
    const textarea = document.createElement('textarea');
    textarea.innerHTML = value;
    return textarea.value;
  }

  function escapeHtml(value) {
    return value
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function renderResults(items, query) {
    results.innerHTML = '';

    if(!query) {
      summary.textContent = 'Enter a keyword to search the website.';
      return;
    }

    if(!items.length) {
      summary.textContent = `No results found for "${query}".`;
      results.innerHTML = '<div class="empty-state">Try another keyword or check the Blog & Articles menu.</div>';
      return;
    }

    summary.textContent = `${items.length} result${items.length === 1 ? '' : 's'} found for "${query}".`;

    items.forEach(item => {
      const card = document.createElement('article');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="result-type">${escapeHtml(item.type)}</div>
        <a href="${escapeHtml(item.url)}">${escapeHtml(item.title)}</a>
        <p>${escapeHtml(item.snippet)}</p>
      `;
      results.appendChild(card);
    });
  }

  async function searchStaticPages(query) {
    const lowerQuery = query.toLowerCase();
    const pageResults = await Promise.all(staticPages.map(async page => {
      try {
        const response = await fetch(page.url);
        if(!response.ok) {
          return null;
        }

        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        doc.querySelectorAll('script, style, nav, footer').forEach(node => node.remove());
        const title = doc.querySelector('title')?.textContent || page.title;
        const text = doc.body?.textContent || '';

        if(!text.toLowerCase().includes(lowerQuery) && !title.toLowerCase().includes(lowerQuery)) {
          return null;
        }

        return {
          type: 'Website',
          title: cleanText(title),
          url: page.url,
          snippet: createSnippet(text, query)
        };
      } catch (error) {
        return null;
      }
    }));

    return pageResults.filter(Boolean);
  }

  async function searchBlog(query) {
    try {
      const url = `/blog/wp-json/wp/v2/search?search=${encodeURIComponent(query)}&subtype=post&page=1&per_page=10`;
      const response = await fetch(url);
      if(!response.ok) {
        return [];
      }

      const posts = await response.json();
      return posts.map(post => ({
        type: 'Blog',
        title: decodeHtml(post.title || 'Blog article'),
        url: post.url,
        snippet: post.url
      }));
    } catch (error) {
      return [];
    }
  }

  async function runSearch(query) {
    input.value = query;
    const trimmed = query.trim();

    if(!trimmed) {
      renderResults([], '');
      return;
    }

    summary.textContent = `Searching for "${trimmed}"...`;
    const [siteResults, blogResults] = await Promise.all([
      searchStaticPages(trimmed),
      searchBlog(trimmed)
    ]);

    renderResults([...siteResults, ...blogResults], trimmed);
  }

  form.addEventListener('submit', event => {
    event.preventDefault();
    const query = input.value.trim();
    const nextUrl = query ? `search.html?q=${encodeURIComponent(query)}` : 'search.html';
    window.history.pushState({}, '', nextUrl);
    runSearch(query);
  });

  runSearch(initialQuery);
  </script>
</body>
</html>
